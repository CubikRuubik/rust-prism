name: Cargo Check & Auto-Fix

on:
  pull_request:
    branches: [main, dev]

jobs:
  cargo-check:
    name: Check compilation
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.check.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run cargo check
        id: check
        run: cargo check
        continue-on-error: true

      - name: Fail job if check failed
        if: steps.check.outcome == 'failure'
        run: exit 1

  auto-fix:
    name: AI auto-fix
    needs: cargo-check
    if: failure() && needs.cargo-check.outputs.failed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Capture cargo errors
        run: cargo check 2> /tmp/cargo-errors.txt || true

      - name: Fetch PR description (change plan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            | jq -r '.body // ""')
          echo "$PR_BODY" > /tmp/pr-description.txt
          echo "===== PR DESCRIPTION ====="
          cat /tmp/pr-description.txt
          echo "=========================="

      - name: Collect Rust source
        run: |
          RUST_CODE=""
          for f in $(find src -name '*.rs' 2>/dev/null); do
            RUST_CODE="$RUST_CODE
          // FILE: $f
          $(cat "$f")
          "
          done
          echo "$RUST_CODE" > /tmp/rust_code.txt

      - name: Analyze and fix with GitHub model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json

          errors = open('/tmp/cargo-errors.txt').read()
          plan = open('/tmp/pr-description.txt').read()
          rust_code = open('/tmp/rust_code.txt').read()

          user_content = 'The cargo check step failed after applying translated Go-to-Rust changes.\n\n'

          if plan.strip():
            user_content += '## Intended change plan (from the Go repo PR description)\n'
            user_content += 'Use this as the authoritative guide for what the code should do. '
            user_content += 'Fix the compilation errors in a way that aligns with this plan.\n\n'
            user_content += plan + '\n\n'

          user_content += '## Current Rust source\n' + rust_code + '\n\n'
          user_content += '## Compiler errors\n' + errors + '\n\n'
          user_content += (
            'Return ONLY a JSON object mapping relative file paths to their full fixed content. '
            'Example: {\"src/main.rs\": \"fn main() { ... }\"}\n'
            'No markdown, no commentary, no code fences — raw JSON only.'
          )

          payload = {
            'model': 'openai/gpt-4.1-mini',
            'temperature': 0,
            'messages': [
              {
                'role': 'system',
                'content': (
                  'You are a Rust compiler expert. '
                  'You receive the current Rust source, a step-by-step change plan (intended behavior), '
                  'and the actual cargo check errors. '
                  'Fix the errors so the code compiles AND matches the intent of the change plan. '
                  'Respond with ONLY a raw JSON object mapping file paths to their complete fixed content.'
                )
              },
              {'role': 'user', 'content': user_content}
            ]
          }
          print(json.dumps(payload))
          " > /tmp/payload.json

          RESPONSE=$(curl -s -X POST "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' > /tmp/ai-response.txt
          echo "===== AI RESPONSE ====="
          cat /tmp/ai-response.txt
          echo "======================="

          # Strip optional markdown code fences then write files
          python3 -c "
          import json, os

          content = open('/tmp/ai-response.txt').read().strip()
          # Strip fences if the model wrapped output anyway
          if content.startswith('\`\`\`'):
            content = '\n'.join(content.split('\n')[1:])
          if content.endswith('\`\`\`'):
            content = '\n'.join(content.split('\n')[:-1])
          content = content.strip()

          try:
            files = json.loads(content)
          except json.JSONDecodeError as e:
            print(f'Failed to parse AI response as JSON: {e}')
            exit(1)

          if not files:
            print('AI returned empty file map — no changes to apply.')
            exit(1)

          for path, code in files.items():
            os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
            with open(path, 'w') as f:
              f.write(code)
            print(f'Written: {path}')
          "

      - name: Commit fix to PR branch
        if: success()
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "fix: resolve cargo check compilation errors [auto-fix]"
          git push origin HEAD:${{ github.head_ref }}
